<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universa — Configurar minha conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #D93E0E; --red-dark: #A32D08; --red-light: #FBE9E4;
      --navy: #0E1B4D;
      --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-300: #D1D5DB; --gray-400: #9CA3AF; --gray-500: #6B7280;
      --gray-600: #4B5563; --gray-700: #374151; --gray-900: #111827;
      --white: #fff;
      --green: #10B981; --green-light: #D1FAE5;
      --amber-light: #FEF3C7;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; color: var(--gray-900); overflow: hidden; }

    /* ── BACKGROUND ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: url('imagens/background-blur.jpeg') center/cover no-repeat;
      filter: blur(18px) brightness(0.5) saturate(0.6); transform: scale(1.05);
    }
    .bg-overlay { position: fixed; inset: 0; z-index: 1; background: rgba(14,27,77,0.5); }

    /* ── PAGE ── */
    .page { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .logo img { height: 32px; width: auto; display: block; }
    .logo-text { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.2; }
    .logo-text span { display: block; font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 400; }
    .topbar-help { font-size: 13px; color: rgba(255,255,255,0.55); text-decoration: none; }
    .topbar-help:hover { color: #fff; }

    /* ── PROGRESS ── */
    .progress-wrap {
      padding: 10px 28px 12px; background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
    }
    .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 7px; }
    .progress-meta strong { color: rgba(255,255,255,0.85); font-weight: 500; }
    .progress-track { display: flex; gap: 3px; }
    .progress-seg { height: 3px; flex: 1; border-radius: 2px; background: rgba(255,255,255,0.14); transition: background 0.4s; }
    .progress-seg.done { background: var(--red); }
    .progress-seg.active { background: rgba(217,62,14,0.5); }

    /* ── SCROLL ── */
    .scroll-area { flex: 1; overflow-y: auto; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px 48px; }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ── CARD ── */
    .form-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.1);
      width: 100%; max-width: 540px; overflow: hidden;
    }
    .card-enter { animation: cardIn 0.22s ease; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── STEP 0 HEADER ── */
    .step-head { background: var(--navy); padding: 20px 28px; display: flex; align-items: center; gap: 12px; }
    .step-num { width: 32px; height: 32px; background: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .step-head h2 { font-size: 15px; font-weight: 600; color: #fff; }
    .step-head p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .step-body { padding: 26px 28px 8px; }
    .step-title { font-size: 19px; font-weight: 700; color: var(--gray-900); margin-bottom: 5px; }
    .step-sub { font-size: 13px; color: var(--gray-500); margin-bottom: 22px; line-height: 1.6; }

    /* ── STEP CONTEXT PILL ── */
    .step-context {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--red-light); color: var(--red-dark);
      border-radius: 100px; padding: 4px 12px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
      margin-bottom: 14px;
    }
    .step-context-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; }

    /* ── SINGLE-QUESTION LAYOUT ── */
    .q-body { padding: 28px 32px 20px; }
    .q-num { font-size: 12px; font-weight: 600; color: var(--red); letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .q-num-arrow { opacity: 0.5; }
    .q-title { font-size: 24px; font-weight: 700; color: var(--gray-900); line-height: 1.25; margin-bottom: 8px; }
    .q-sub { font-size: 13px; color: var(--gray-400); margin-bottom: 24px; line-height: 1.5; }
    .q-hint { font-size: 11px; color: var(--gray-400); margin-top: 14px; display: flex; align-items: center; gap: 6px; }
    .q-hint kbd { background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-family: inherit; color: var(--gray-500); }
    .q-footer { padding: 12px 32px 28px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .q-footer.end { justify-content: flex-end; }

    /* ── INPUTS ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 5px; }
    .req { color: var(--red); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm); font-size: 15px; color: var(--gray-900);
      background: var(--white); font-family: inherit; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; appearance: none;
    }
    .form-input::placeholder { color: var(--gray-300); }
    .form-input:focus, .form-select:focus {
      border-color: var(--red); box-shadow: 0 0 0 3px rgba(217,62,14,0.08);
    }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; min-width: 0; }
    .form-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
    .select-wrap { position: relative; }
    .select-wrap::after { content: '▾'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 12px; color: var(--gray-400); }
    .form-select { font-size: 14px; }

    /* ── BIG INPUT (single question) ── */
    .big-input {
      width: 100%; padding: 14px 16px; border: 0; border-bottom: 2px solid var(--gray-200);
      border-radius: 0; font-size: 20px; color: var(--gray-900); font-family: inherit;
      outline: none; background: transparent; transition: border-color 0.2s;
    }
    .big-input::placeholder { color: var(--gray-300); }
    .big-input:focus { border-bottom-color: var(--red); }

    /* ── CHIPS ── */
    .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 8px 16px; border: 1.5px solid var(--gray-200); border-radius: 100px; font-size: 13px; font-weight: 500; color: var(--gray-600); cursor: pointer; transition: all 0.15s; user-select: none; }
    .chip:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .chip.selected { border-color: var(--red); background: var(--red-light); color: var(--red-dark); }

    /* ── RADIO CARDS ── */
    .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .radio-card { padding: 14px 10px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
    .radio-card:hover { border-color: var(--gray-300); background: var(--gray-50); }
    .radio-card.selected { border-color: var(--red); background: var(--red-light); }
    .radio-card-icon { font-size: 22px; margin-bottom: 6px; }
    .radio-card-label { font-size: 12px; font-weight: 500; color: var(--gray-600); line-height: 1.3; }
    .radio-card.selected .radio-card-label { color: var(--red-dark); }

    /* ── CHECK ITEMS ── */
    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-item { display: flex; align-items: flex-start; gap: 11px; padding: 12px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; user-select: none; }
    .check-item:hover { border-color: var(--gray-300); background: var(--gray-50); }
    .check-item.selected { border-color: var(--red); background: var(--red-light); }
    .check-box { width: 18px; height: 18px; border: 1.5px solid var(--gray-300); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-item.selected .check-box { background: var(--red); border-color: var(--red); }
    .checkmark { display: none; }
    .check-item.selected .checkmark { display: block; }
    .check-text { font-size: 13px; color: var(--gray-800); line-height: 1.4; }
    .check-sub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
    .check-item.selected .check-text { color: var(--red-dark); font-weight: 500; }

    /* ── INLINE OPTION LIST (single select, Typeform-style) ── */
    .opt-list { display: flex; flex-direction: column; gap: 8px; }
    .opt-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; user-select: none; }
    .opt-item:hover { border-color: var(--gray-300); background: var(--gray-50); }
    .opt-item.selected { border-color: var(--red); background: var(--red-light); }
    .opt-key { width: 24px; height: 24px; border: 1.5px solid var(--gray-300); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--gray-400); flex-shrink: 0; transition: all 0.15s; }
    .opt-item.selected .opt-key { background: var(--red); border-color: var(--red); color: #fff; }
    .opt-label { font-size: 14px; color: var(--gray-800); }
    .opt-item.selected .opt-label { color: var(--red-dark); font-weight: 500; }

    /* ── COURSE CARDS ── */
    .course-grid { display: flex; flex-direction: column; gap: 7px; }
    .course-card { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; }
    .course-card:hover:not(.locked) { border-color: var(--gray-300); background: var(--gray-50); }
    .course-card.selected { border-color: var(--red); background: var(--red-light); }
    .course-card.locked { opacity: 0.6; cursor: default; background: var(--gray-50); }
    .course-thumb { width: 40px; height: 40px; border-radius: 8px; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .course-info { flex: 1; min-width: 0; }
    .course-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
    .course-meta { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .course-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 100px; white-space: nowrap; }
    .badge-versa { background: var(--red-light); color: var(--red-dark); }
    .badge-locked { background: var(--amber-light); color: #92400E; }
    .course-check { width: 20px; height: 20px; border: 1.5px solid var(--gray-300); border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .course-card.selected .course-check { background: var(--red); border-color: var(--red); }
    .chk-svg { display: none; }
    .course-card.selected .chk-svg { display: block; }

    /* ── UNITS ── */
    .unit-list { display: flex; flex-direction: column; gap: 8px; }
    .unit-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); background: var(--gray-50); }
    .unit-icon { font-size: 18px; }
    .unit-name-input { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--gray-900); font-family: inherit; outline: none; }
    .unit-name-input::placeholder { color: var(--gray-400); }
    .unit-remove { background: none; border: none; cursor: pointer; color: var(--gray-300); font-size: 20px; line-height: 1; padding: 0 2px; }
    .unit-remove:hover { color: var(--red); }
    .add-unit-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1.5px dashed var(--gray-300); border-radius: var(--radius-md); background: none; cursor: pointer; font-size: 13px; color: var(--gray-500); font-family: inherit; transition: all 0.15s; width: 100%; }
    .add-unit-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

    /* ── INVITE ── */
    .invite-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .invite-opt { padding: 16px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-md); cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
    .invite-opt:hover { border-color: var(--gray-300); background: var(--gray-50); }
    .invite-opt.selected { border-color: var(--red); background: var(--red-light); }
    .invite-opt-icon { font-size: 26px; margin-bottom: 8px; }
    .invite-opt-label { font-size: 12px; font-weight: 600; color: var(--gray-700); }
    .invite-opt-sub { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
    .invite-opt.selected .invite-opt-label { color: var(--red-dark); }
    .student-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .student-row .form-input { flex: 1; font-size: 13px; padding: 9px 12px; }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--gray-300); font-size: 20px; padding: 0 2px; }
    .remove-btn:hover { color: var(--red); }
    .link-box { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--gray-100); border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 12px; color: var(--gray-600); }
    .link-box span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { padding: 5px 12px; background: var(--navy); color: #fff; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .copy-btn:hover { background: var(--red); }
    .qr-mockup { width: 96px; height: 96px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 38px; margin: 0 auto; }

    /* ── BRAND ── */
    .upload-area { border: 2px dashed var(--gray-300); border-radius: var(--radius-md); padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.15s; background: var(--gray-50); display: block; }
    .upload-area:hover { border-color: var(--red); background: var(--red-light); }
    .upload-area.has-file { border-color: var(--green); background: var(--green-light); border-style: solid; }
    .upload-icon { font-size: 30px; margin-bottom: 8px; }
    .upload-text { font-size: 13px; color: var(--gray-500); line-height: 1.5; }
    .upload-input { display: none; }
    .palette-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .palette-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
    .palette-dots { display: flex; gap: 3px; }
    .palette-dot { width: 26px; height: 26px; border-radius: 6px; border: 2.5px solid transparent; transition: transform 0.15s, border-color 0.15s; }
    .palette-item.selected .palette-dot { border-color: var(--gray-900); transform: scale(1.12); }
    .palette-name { font-size: 10px; color: var(--gray-400); }
    .palette-item.selected .palette-name { color: var(--gray-700); font-weight: 600; }

    /* ── SUCCESS ── */
    .success-body { padding: 40px 28px 32px; text-align: center; }
    .confetti-row { display: flex; justify-content: center; gap: 6px; font-size: 22px; margin-bottom: 14px; }
    .success-icon { font-size: 52px; margin-bottom: 12px; display: block; }
    .success-title { font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--gray-500); line-height: 1.7; max-width: 360px; margin: 0 auto 24px; }
    .video-wrap { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: var(--radius-md); overflow: hidden; margin: 0 auto 24px; max-width: 440px; background: #000; }
    .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .btn-explore { display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px; background: var(--red); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; text-decoration: none; }
    .btn-explore:hover { background: var(--red-dark); }
    .btn-explore-locked { background: var(--gray-300); cursor: not-allowed; }
    .btn-explore-locked:hover { background: var(--gray-300); }
    .success-skip { margin-top: 12px; font-size: 12px; }
    .success-skip a { color: var(--gray-400); }

    /* ── NAV BUTTONS ── */
    .step-footer { padding: 14px 28px 24px; display: flex; gap: 10px; justify-content: space-between; align-items: center; border-top: 1px solid var(--gray-100); }
    .step-footer.end { justify-content: flex-end; }
    .btn-back { padding: 10px 20px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--white); font-size: 14px; color: var(--gray-600); cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-back:hover { background: var(--gray-100); }
    .btn-next { padding: 10px 22px; background: var(--red); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit; transition: background 0.15s; display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .btn-next:hover { background: var(--red-dark); }
    .btn-skip { background: none; border: none; font-size: 13px; color: var(--gray-400); cursor: pointer; font-family: inherit; text-decoration: underline; padding: 10px 0; }
    .btn-skip:hover { color: var(--gray-600); }

    /* ── INFO BOX ── */
    .info-box { display: flex; gap: 10px; padding: 11px 14px; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: var(--radius-sm); font-size: 12px; color: #1D4ED8; line-height: 1.5; margin-bottom: 16px; }
    .divider { height: 1px; background: var(--gray-100); margin: 8px 0 16px; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--gray-400); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }

    @media (max-width: 600px) {
      .topbar, .progress-wrap { padding-left: 16px; padding-right: 16px; }
      .q-body { padding: 28px 20px 16px; }
      .q-footer { padding: 10px 20px 22px; }
      .step-body { padding: 22px 20px 6px; }
      .step-footer { padding: 12px 20px 20px; }
      .success-body { padding: 30px 20px 24px; }
      .form-row { flex-direction: column; gap: 0; }
      .big-input { font-size: 17px; }
      .q-title { font-size: 19px; }
    }
  </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="page">
  <header class="topbar">
    <a href="https://versaeducacao.com.br" class="logo" target="_blank">
      <img src="imagens/logo-universa.png" alt="Universa by Versa Educação" />
    </a>
    <a href="mailto:contato@versaeducacao.com.br" class="topbar-help">Precisa de ajuda?</a>
  </header>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-meta">
      <span id="progress-label"></span>
      <span id="progress-name" style="color:rgba(255,255,255,0.7);font-weight:500;"></span>
    </div>
    <div class="progress-track" id="progress-track"></div>
  </div>

  <div class="scroll-area">
    <div class="form-card card-enter" id="form-card"></div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let step = 0;
let selectedCourses = new Set([0,1,2,3]);
let units = [{ name: '' }];
let studentRows = [{ name: '', phone: '' }];
let inviteMode = null;
let selectedPalette = 0;

// ─── STEPS CONFIG ────────────────────────────────────────
// step 0 → multi-field (contato)
// steps 1–N → one question at a time
// last step → success screen

const STEP_LABELS = [
  'Contato','Razão social','CNPJ','Site','Endereço',
  'Número','Segmento','Porte','Como soube','Objetivos',
  'Plataforma atual','Unidades','Cursos','Alunos','Identidade visual','Conclusão'
];
const TOTAL_STEPS = STEP_LABELS.length;

const SEGMENTS = [
  'Varejo alimentar','Varejo não alimentar','Redes de franquias',

  'Hotelaria e turismo','Construção civil','Serviços financeiros',

    : `<div class="q-num">${String(n).padStart(2,'0')} <span class="q-num-arrow">→</span></div>`;

}
function qFooter(hasBack, nextLabel, skipLabel) {
  const backBtn = hasBack ? `<button class="btn-back" onclick="back()">Voltar</button>` : `<span></span>`;
  const skipBtn = skipLabel ? `<button class="btn-skip" onclick="advance()">${skipLabel}</button>` : '';
  return `<div class="q-footer">${backBtn}<div style="display:flex;gap:10px;align-items:center">${skipBtn}<button class="btn-next" onclick="advance()">${nextLabel || 'Continuar'} ${arrow()}</button></div></div>`;
}

function maskCNPJ(el) {
  let v = el.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})$/,'$1.$2.$3/$4-$5');
  else if(v.length>8) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d+)$/,'$1.$2.$3/$4');
  else if(v.length>5) v=v.replace(/^(\d{2})(\d{3})(\d+)$/,'$1.$2.$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d+)$/,'$1.$2');
  el.value=v;
}
function maskPhone(el) {
  let v = el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>6) v=v.replace(/^(\d{2})(\d{5})(\d+)$/,'($1) $2-$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d+)$/,'($1) $2');
  el.value=v;
}
function maskCEP(el) {
  let v = el.value.replace(/\D/g,'').slice(0,8);
  if(v.length>5) v=v.replace(/^(\d{5})(\d+)$/,'$1-$2');
  el.value=v;
  if(v.replace(/\D/g,'').length===8) fetchCEP(v.replace(/\D/g,''));
}
async function fetchCEP(cep) {
  try {
    const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const d = await r.json();
    if(!d.erro) {
      const s=document.getElementById('c-street'); if(s) s.value=d.logradouro||'';
      const n=document.getElementById('c-neighborhood'); if(n) n.value=d.bairro||'';
      const c=document.getElementById('c-city'); if(c) c.value=d.localidade||'';
      const u=document.getElementById('c-uf'); if(u) u.value=d.uf||'';
    }
  } catch(e){}
}

// ─── PROGRESS ────────────────────────────────────────────
function renderProgress() {
  const isLast = step >= TOTAL_STEPS - 1;
  document.getElementById('progress-wrap').style.display = isLast ? 'none' : '';
  if(isLast) return;
  document.getElementById('progress-label').innerHTML = `Etapa <strong>${step+1}</strong> de ${TOTAL_STEPS-1}`;
  document.getElementById('progress-name').textContent = STEP_LABELS[step]||'';
  document.getElementById('progress-track').innerHTML = Array.from({length:TOTAL_STEPS-1},(_,i)=>{
    const cls = i<step?'done':i===step?'active':'';
    return `<div class="progress-seg ${cls}"></div>`;
  }).join('');
}

// ─── KEYBOARD ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='Enter' && step>0 && step<TOTAL_STEPS-1) {
    const active = document.activeElement;
    if(active && (active.tagName==='TEXTAREA')) return;
    if(active && active.classList.contains('big-input')) { advance(); return; }
    if(active && active.tagName==='INPUT' && active.type!=='file') { advance(); return; }
  }
});

// ─── RENDER ──────────────────────────────────────────────
function render() {
  renderProgress();
  const card=document.getElementById('form-card');
  card.innerHTML=getStep(step);
  card.className='form-card card-enter';
  document.querySelector('.scroll-area').scrollTop=0;
  // auto-focus first input
  setTimeout(()=>{const f=card.querySelector('.big-input,.form-input');if(f&&step>0)f.focus();},80);
}

  const fn = [s0,s1,s2,s3,s4,s5,s6,s7,s8,s9,s10,s11,s12,s13,s14,s15];
  return fn[s] ? fn[s]() : '';
}

    ${qFooter(true,'Confirmar')}
    <script>renderUnits();<\/script>`;
}

// STEP 12 — cursos
function s12() {
  const versaHtml = VERSA_COURSES.map((c,i)=>`
    <div class="course-card${selectedCourses.has(i)?' selected':''}" onclick="toggleCourse(${i})">
      <div class="course-thumb">${c.icon}</div>
      <div class="course-info"><div class="course-name">${c.name}</div><div class="course-meta">${c.meta}</div></div>
      <span class="course-badge badge-versa">Versa</span>
      <div class="course-check">${chkSvg()}</div>
    </div>`).join('');
  const lockedHtml = LOCKED_COURSES.map(c=>`
    <div class="course-card locked">
      <div class="course-thumb" style="background:var(--gray-200)">${c.icon}</div>
      <div class="course-info"><div class="course-name" style="color:var(--gray-400)">${c.name}</div><div class="course-meta">${c.meta}</div></div>
      <span class="course-badge badge-locked">🔒 Upgrade</span>
    </div>`).join('');
  return `
    <div class="q-body">
      ${qNum(13)}
      <h2 class="q-title">Quais cursos ficam disponíveis para sua equipe?</h2>
      <p class="q-sub">Você pode alterar essa seleção a qualquer momento.</p>
      <div class="section-label">Incluídos no seu plano</div>
      <div class="course-grid">${versaHtml}</div>
      <div style="height:12px"></div>
      <div class="section-label">Disponíveis com upgrade</div>
      <div class="course-grid">${lockedHtml}</div>
      <p class="form-hint" style="margin-top:6px">Fale com nosso time comercial para desbloquear os cursos parceiros.</p>
    </div>
    ${qFooter(true,'Confirmar seleção')}`;
}

// STEP 13 — alunos
function s13() {
  return `
    <div class="q-body">
      ${qNum(14)}
      <h2 class="q-title">Como quer convidar os primeiros colaboradores?</h2>
      <p class="q-sub">Escolha um método — ou combine vários.</p>
      <div class="invite-grid">
        <div class="invite-opt" id="inv-manual" onclick="setInviteMode('manual')">
          <div class="invite-opt-icon">✏️</div>
          <div class="invite-opt-label">Manual</div>
          <div class="invite-opt-sub">Nome e celular</div>
        </div>
        <div class="invite-opt" id="inv-csv" onclick="setInviteMode('csv')">
          <div class="invite-opt-icon">📋</div>
          <div class="invite-opt-label">Importar CSV</div>
          <div class="invite-opt-sub">Planilha de dados</div>
        </div>
        <div class="invite-opt" id="inv-whatsapp" onclick="setInviteMode('whatsapp')">
          <div class="invite-opt-icon">💬</div>
          <div class="invite-opt-label">Link WhatsApp</div>
          <div class="invite-opt-sub">Convite por mensagem</div>
        </div>
        <div class="invite-opt" id="inv-qr" onclick="setInviteMode('qr')">
          <div class="invite-opt-icon">◼◻◼</div>
          <div class="invite-opt-label">QR Code</div>
          <div class="invite-opt-sub">Para impressão</div>
        </div>
      </div>
      <div id="invite-detail"></div>
    </div>
    ${qFooter(true,'Continuar','Pular por agora')}`;
}

// STEP 14 — identidade visual
function s14() {
  const paletteHtml = PALETTES.map((p,i)=>`
    <div class="palette-item${i===selectedPalette?' selected':''}" onclick="selectedPalette=${i};render()">
      <div class="palette-dots">${p.colors.map(c=>`<div class="palette-dot" style="background:${c}"></div>`).join('')}</div>
      <span class="palette-name">${p.label}</span>
    </div>`).join('');
  return `
    <div class="q-body">
      ${qNum(15)}
      <h2 class="q-title">Como é a identidade visual da sua empresa?</h2>
      <p class="q-sub">Personalize a plataforma com o logo e as cores da sua marca.</p>
      <div class="form-group">
        <label class="form-label">Logo da empresa</label>
        <label class="upload-area" id="upload-area">
          <div class="upload-icon">🖼️</div>
          <div class="upload-text"><strong>Clique para enviar o logo</strong><br>PNG ou SVG · fundo transparente · máx 2MB</div>
          <input type="file" accept=".png,.svg,.jpg,.jpeg" class="upload-input" onchange="handleLogoUpload(this)" />
        </label>
      </div>
      <div class="form-group">
        <label class="form-label">Paleta de cores</label>
        <div class="palette-row" style="margin-top:8px">${paletteHtml}</div>
      </div>
    </div>
    ${qFooter(true,'Finalizar configuração','Pular por agora')}`;
}

// STEP 15 — success
function s15() {
  return `
    <div class="success-body">
      <div class="confetti-row">🎊 🎉 🥳 🎊 🎉</div>
      <span class="success-icon">🚀</span>
      <h2 class="success-title">Sua plataforma está pronta!</h2>
      <p class="success-sub">Parabéns! Antes de começar a explorar, assista ao tutorial rápido — leva menos de 3 minutos.</p>
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/9A-9dHbZ4VI?rel=0&modestbranding=1" title="Tutorial de boas-vindas — Universa" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <a href="https://app.versaedu.com.br/" id="btn-explore" class="btn-explore btn-explore-locked" aria-disabled="true" onclick="return document.getElementById('btn-explore').classList.contains('btn-explore-locked')?false:true">
        <span id="btn-lbl">Aguarde <span id="cd">8</span>s…</span>
        <span id="btn-arr" style="display:none">${arrow()}</span>
      </a>
      <div class="success-skip" id="s-skip" style="visibility:hidden">
        <a href="https://app.versaedu.com.br/">Pular tutorial e ir direto para a plataforma</a>
      </div>
    </div>
    <script>(function(){
      var r=8,btn=document.getElementById('btn-explore'),lbl=document.getElementById('btn-lbl'),arr=document.getElementById('btn-arr'),skip=document.getElementById('s-skip'),cd=document.getElementById('cd');
      btn.style.pointerEvents='none';
      var t=setInterval(function(){
        r--;if(cd)cd.textContent=r+'s';
        if(r<=0){clearInterval(t);btn.style.pointerEvents='';btn.classList.remove('btn-explore-locked');btn.removeAttribute('aria-disabled');lbl.textContent='Começar a explorar';arr.style.display='inline-flex';if(skip)skip.style.visibility='visible';}
      },1000);
    })();<\/script>`;
}

// ─── INIT ─────────────────────────────────────────────────
